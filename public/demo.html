<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics Demo Page</title>
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: #f9fafb; color: #111827; }
    header { background: #4f46e5; color: white; padding: 2rem; text-align: center; }
    main { padding: 4rem 2rem; max-width: 800px; margin: 0 auto; text-align: center; }
    button { background: #4f46e5; color: white; border: none; padding: 1rem 2rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer; margin: 1rem; transition: transform 0.1s; }
    button:active { transform: scale(0.95); }
    .box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 2rem; }
  </style>
  <!-- Inject Tracking Script -->
  <script src="/tracker.js"></script>
</head>
<body>
  <header>
    <h1>Welcome to the Demo Store</h1>
    <p>Interact with the page to generate analytics events.</p>
  </header>
  <main>
    <button onclick="alert('Added to cart!')">Add to Cart</button>
    <button onclick="alert('Checking out!')" style="background: #10b981;">Checkout</button>
    <div class="box">
      <h2>Product Details</h2>
      <p>Click anywhere around this box or the buttons above to simulate user journey and generate click heatmaps.</p>
      <a href="/">Go back to Dashboard</a>
    </div>
  </main>
</body>
</html>
